# ════════════════════════════════════════════
# CI/CD GitHub Actions — Credit Risk API
# Runs tests on every push to 'main'
# If tests pass, triggers a redeploy on Render
# ════════════════════════════════════════════

name: CI/CD - Credit Risk API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ── Job 1 : Tests ──────────────────────────
  test:
    name:  Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test module imports
        run: |
          python -c "import fastapi;    print(' FastAPI OK')"
          python -c "import xgboost;   print(' XGBoost OK')"
          python -c "import sklearn;   print(' Scikit-learn OK')"
          python -c "import joblib;    print(' Joblib OK')"
          python -c "import pandas;    print(' Pandas OK')"

  # ── Job 2 : Deploy ─────────────────────────
  deploy:
    name:  Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for Render to restart
        run: sleep 30

      - name: Smoke test — /health endpoint
        run: |
          curl -fsS "${{ secrets.RENDER_URL }}/health" \
            || (echo " Health check failed – API not responding" && exit 1)
          echo " API is up and responding"